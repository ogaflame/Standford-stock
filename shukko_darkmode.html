<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>出庫推移検索</title>
<style>
  :root{
    --bg:#f5f7fb;
    --text:#1f2937;
    --muted:#6b7280;
    --card:#ffffff;
    --card-soft:#f3f6fb;
    --header:#24344d;
    --header-text:#ffffff;
    --primary:#24344d;
    --primary-text:#ffffff;
    --secondary:#e8edf5;
    --secondary-text:#24344d;
    --border:#e5e7eb;
    --input-border:#ccd3df;
    --input-bg:#ffffff;
    --chip-bg:#eef2ff;
    --chip-text:#27336b;
    --chip-border:#c7d2fe;
    --ok:#166534;
    --bad:#b91c1c;
    --svg-bg:#ffffff;
    --grid:#eef2f7;
    --axis:#cbd5e1;
    --line:#2563eb;
    --axis-text:#64748b;
    --shadow:0 2px 12px rgba(0,0,0,.08);
  }
  html[data-theme="dark"]{
    --bg:#0f172a;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --card:#111827;
    --card-soft:#1f2937;
    --header:#020617;
    --header-text:#f8fafc;
    --primary:#3b82f6;
    --primary-text:#ffffff;
    --secondary:#1f2937;
    --secondary-text:#e5e7eb;
    --border:#334155;
    --input-border:#475569;
    --input-bg:#0b1220;
    --chip-bg:#172554;
    --chip-text:#dbeafe;
    --chip-border:#1d4ed8;
    --ok:#86efac;
    --bad:#fca5a5;
    --svg-bg:#0b1220;
    --grid:#1e293b;
    --axis:#475569;
    --line:#60a5fa;
    --axis-text:#cbd5e1;
    --shadow:0 2px 14px rgba(0,0,0,.35);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:var(--bg);color:var(--text);}
  header{background:var(--header);color:var(--header-text);padding:18px 16px;}
  .headerInner{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  h1{font-size:22px;margin:0 0 6px;} .sub{opacity:.85;font-size:13px;}
  .themeToggle{white-space:nowrap;background:rgba(255,255,255,.14);color:var(--header-text);border:1px solid rgba(255,255,255,.35);font-size:13px;padding:9px 12px;margin:0;}
  main{padding:14px;max-width:1100px;margin:auto;}
  .card{background:var(--card);border-radius:14px;padding:14px;margin:12px 0;box-shadow:var(--shadow);border:1px solid rgba(148,163,184,.12);}
  label{font-weight:700;display:block;margin:8px 0 5px;}
  input,select,button{font-size:16px;border-radius:10px;border:1px solid var(--input-border);padding:10px;box-sizing:border-box;}
  input,select{width:100%;background:var(--input-bg);color:var(--text);}
  button{background:var(--primary);color:var(--primary-text);border:none;margin:6px 6px 6px 0;cursor:pointer;}
  button.secondary{background:var(--secondary);color:var(--secondary-text);border:1px solid var(--border);}
  .status{font-size:13px;color:var(--muted);margin-top:8px;white-space:pre-wrap;}
  .bad{color:var(--bad);font-weight:700;}.ok{color:var(--ok);font-weight:700;}
  .grid{display:grid;grid-template-columns:1fr;gap:10px;} @media(min-width:760px){.grid{grid-template-columns:1fr 1fr;}}
  .chips button{font-size:13px;padding:8px 10px;background:var(--chip-bg);color:var(--chip-text);border:1px solid var(--chip-border);}
  .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;} @media(min-width:760px){.summary{grid-template-columns:repeat(4,1fr);}}
  .summary div{background:var(--card-soft);border-radius:12px;padding:10px;}.summary b{display:block;font-size:12px;color:var(--muted)}.summary span{font-size:19px;font-weight:800;}
  .chartBox{overflow-x:auto;} svg{background:var(--svg-bg);border:1px solid var(--border);border-radius:12px;min-width:760px;}
  table{border-collapse:collapse;width:100%;font-size:14px;background:var(--card);color:var(--text);} th,td{border-bottom:1px solid var(--border);padding:8px;text-align:right;} th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--card);} th{background:var(--card-soft);}
  .tableWrap{overflow:auto;max-height:430px;border:1px solid var(--border);border-radius:12px;}
  .small{font-size:12px;color:var(--muted);}
  details summary{cursor:pointer;}
  @media(max-width:520px){.headerInner{align-items:flex-start}.themeToggle{font-size:12px;padding:8px 10px}.summary{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<script>
(function(){
  try{
    var saved=localStorage.getItem("shukko-theme");
    var prefersDark=window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
  }catch(e){ document.documentElement.setAttribute("data-theme","light"); }
})();
</script>
<header>
  <div class="headerInner">
    <div>
      <h1>出庫推移検索</h1>
      <div class="sub">薬品名を選択して、2023年7月〜2026年5月の調剤数量推移を確認します。</div>
    </div>
    <button id="themeToggle" type="button" class="themeToggle" aria-label="表示モードを切り替え">🌙 ダーク</button>
  </div>
</header>
<main>
  <div class="card">
    <div id="loadStatus" class="status">読み込み中です。ここが長く残る場合は、初期化処理で停止しています。</div>
  </div>

  <div class="card">
    <div class="grid">
      <div>
        <label for="searchText">薬品名検索</label>
        <input id="searchText" type="text" placeholder="例：アスベリン、トラネキサム酸、カロナール" autocomplete="off">
        <button id="searchBtn" type="button">候補を絞り込み</button>
        <button id="clearBtn" type="button" class="secondary">クリア</button>
      </div>
      <div>
        <label for="drugSelect">薬品リストから選択</label>
        <select id="drugSelect"><option value="">初期化中...</option></select>
        <button id="showBtn" type="button">選択した薬品を表示</button>
      </div>
    </div>
    <div class="status" id="resultStatus"></div>
  </div>

  <div class="card">
    <label>主要医薬品</label>
    <div id="majorButtons" class="chips"></div>
  </div>

  <div id="viewArea" style="display:none;">
    <div class="card">
      <h2 id="drugTitle" style="margin:0 0 10px;font-size:20px;"></h2>
      <div class="summary">
        <div><b>期間合計</b><span id="sumQty">-</span></div>
        <div><b>直近3か月平均</b><span id="avg3">-</span></div>
        <div><b>直近6か月平均</b><span id="avg6">-</span></div>
        <div><b>直近12か月平均</b><span id="avg12">-</span></div>
      </div>
    </div>
    <div class="card">
      <h2 style="margin:0 0 10px;font-size:18px;">月別推移グラフ</h2>
      <div class="chartBox" id="chart"></div>
      <div class="small">数量が0の月も含めて表示しています。</div>
    </div>
    <div class="card">
      <h2 style="margin:0 0 10px;font-size:18px;">月別データ</h2>
      <div class="tableWrap" id="dataTable"></div>
    </div>
  </div>

  <div class="card">
    <details><summary>取込状況</summary><div id="importInfo" class="tableWrap" style="margin-top:10px;"></div></details>
  </div>
</main>

    applyLabel();
  }
  function norm(s){return String(s||'').toLowerCase().replace(/[\s　]/g,'').replace(/[．｡。]/g,'.').replace(/[％]/g,'%');}
  function fmt(n){ if(n===null||n===undefined||n==='') return ''; var x=Number(n); if(!isFinite(x)) return String(n); return x.toLocaleString('ja-JP',{maximumFractionDigits:2}); }
  function setStatus(msg, cls){ var e=byId('loadStatus'); if(e){ e.className='status '+(cls||''); e.textContent=msg; } }
  function getDrug(name){ var arr=APP_DATA.drugs; for(var i=0;i<arr.length;i++){ if(arr[i].name===name) return arr[i]; } return null; }
  function fillSelect(list){
    var sel=byId('drugSelect'); if(!sel) return;
    var h='<option value="">薬品を選択してください</option>';
    for(var i=0;i<list.length;i++){ var name=list[i].name||list[i]; h+='<option value="'+escapeHtml(name)+'">'+escapeHtml(name)+'</option>'; }
    sel.innerHTML=h;
  }
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function filterDrugs(){
    var q=norm(byId('searchText').value);
    var list=[];
    if(!q){ list=APP_DATA.drugs.slice(0,200); }
    else{
      for(var i=0;i<APP_DATA.drugs.length;i++){ if(norm(APP_DATA.drugs[i].name).indexOf(q)>=0) list.push(APP_DATA.drugs[i]); }
    }
    fillSelect(list);
    byId('resultStatus').textContent='候補：'+list.length+'件' + (list.length>200?'（先頭200件を表示）':'');
  }
  function choose(name){
    if(!name){ byId('resultStatus').textContent='薬品を選択してください。'; return; }
    var d=getDrug(name);
    if(!d){ byId('resultStatus').textContent='該当する薬品が見つかりません：'+name; return; }
    byId('drugSelect').value=name;
    showDrug(d);
  }
  function recentAvg(q, n){ var start=Math.max(0,q.length-n); var s=0,c=0; for(var i=start;i<q.length;i++){ s+=Number(q[i]||0); c++; } return c?s/c:0; }
  function showDrug(d){
    byId('viewArea').style.display='block';
    byId('drugTitle').textContent=d.name + (d.unit ? '（単位：'+d.unit+'）' : '');
    var sum=0; for(var i=0;i<d.q.length;i++) sum+=Number(d.q[i]||0);
    byId('sumQty').textContent=fmt(sum);
    byId('avg3').textContent=fmt(recentAvg(d.q,3));
    byId('avg6').textContent=fmt(recentAvg(d.q,6));
    byId('avg12').textContent=fmt(recentAvg(d.q,12));
    drawChart(d);
    drawTable(d);
    byId('resultStatus').textContent='表示中：'+d.name;
  }
  function drawChart(d){
    var q=d.q, months=APP_DATA.months, max=0;
    var axis=cssVar('--axis'), grid=cssVar('--grid'), line=cssVar('--line'), axisText=cssVar('--axis-text');
    for(var i=0;i<q.length;i++){ if(Number(q[i])>max) max=Number(q[i]); }
    if(max<=0) max=1;
    var w=920,h=340, ml=55,mr=20,mt=20,mb=70;
    var pw=w-ml-mr, ph=h-mt-mb;
    var pts=[];
    for(var j=0;j<q.length;j++){
      var x=ml + (months.length===1?0:(pw*j/(months.length-1)));
      var y=mt + ph - (Number(q[j]||0)/max)*ph;
      pts.push([x,y]);
    }
    var parts=[];
    parts.push('<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="340" role="img">');
    parts.push('<line x1="'+ml+'" y1="'+mt+'" x2="'+ml+'" y2="'+(mt+ph)+'" stroke="'+axis+'"/>');
    parts.push('<line x1="'+ml+'" y1="'+(mt+ph)+'" x2="'+(ml+pw)+'" y2="'+(mt+ph)+'" stroke="'+axis+'"/>');
    for(var g=0;g<=4;g++){ var gy=mt+ph-(ph*g/4); var val=max*g/4; parts.push('<line x1="'+ml+'" y1="'+gy+'" x2="'+(ml+pw)+'" y2="'+gy+'" stroke="'+grid+'"/>'); parts.push('<text x="'+(ml-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="11" fill="'+axisText+'">'+fmt(val)+'</text>'); }
    var pointStr=''; for(var p=0;p<pts.length;p++){ pointStr+=pts[p][0].toFixed(1)+','+pts[p][1].toFixed(1)+' '; }
    parts.push('<polyline points="'+pointStr+'" fill="none" stroke="'+line+'" stroke-width="3"/>');
    for(var k=0;k<pts.length;k++){ parts.push('<circle cx="'+pts[k][0].toFixed(1)+'" cy="'+pts[k][1].toFixed(1)+'" r="3" fill="'+line+'"><title>'+months[k]+'：'+fmt(q[k])+'</title></circle>'); if(k%3===0 || k===months.length-1){ parts.push('<text x="'+pts[k][0].toFixed(1)+'" y="'+(mt+ph+25)+'" font-size="10" fill="'+axisText+'" text-anchor="middle" transform="rotate(45 '+pts[k][0].toFixed(1)+' '+(mt+ph+25)+')">'+months[k]+'</text>'); } }
    parts.push('</svg>');
    byId('chart').innerHTML=parts.join('');
  }
  function drawTable(d){
    var h='<table><thead><tr><th>月</th><th>調剤数量</th><th>調剤件数</th></tr></thead><tbody>';
    for(var i=0;i<APP_DATA.months.length;i++){ h+='<tr><td>'+APP_DATA.months[i]+'</td><td>'+fmt(d.q[i])+'</td><td>'+fmt(d.c[i])+'</td></tr>'; }
    h+='</tbody></table>'; byId('dataTable').innerHTML=h;
  }
  function drawMajor(){
    var h=''; for(var i=0;i<APP_DATA.major.length;i++){ var name=APP_DATA.major[i]; h+='<button type="button" data-name="'+escapeHtml(name)+'">'+escapeHtml(name)+'</button>'; }
    byId('majorButtons').innerHTML=h;
    var btns=byId('majorButtons').getElementsByTagName('button');
    for(var j=0;j<btns.length;j++){ btns[j].onclick=function(){ choose(this.getAttribute('data-name')); }; }
  }
  function drawInfo(){
    var h='<table><thead><tr><th>対象月</th><th>ファイル</th><th>行数</th></tr></thead><tbody>';
    for(var i=0;i<APP_DATA.info.length;i++){ var r=APP_DATA.info[i]; h+='<tr><td>'+escapeHtml(r.month)+'</td><td>'+escapeHtml(r.file)+'</td><td>'+fmt(r.rows)+'</td></tr>'; }
    h+='</tbody></table>'; byId('importInfo').innerHTML=h;
  }
  function init(){
    try{
      setupTheme();
      if(!APP_DATA || !APP_DATA.drugs || !APP_DATA.months){ setStatus('データが見つかりません。HTML内の埋め込みデータに問題があります。','bad'); return; }
      fillSelect(APP_DATA.drugs);
      drawMajor(); drawInfo();
      byId('searchBtn').onclick=filterDrugs;
      byId('clearBtn').onclick=function(){ byId('searchText').value=''; fillSelect(APP_DATA.drugs); byId('resultStatus').textContent=''; };
      byId('showBtn').onclick=function(){ choose(byId('drugSelect').value); };
      byId('drugSelect').onchange=function(){ choose(this.value); };
      byId('searchText').oninput=function(){ filterDrugs(); };
      setStatus('読み込み完了：薬品数 '+APP_DATA.drugs.length+'品目 / 月数 '+APP_DATA.months.length+'か月。薬品を選択してください。','ok');
    }catch(e){ setStatus('初期化エラー：'+(e && e.message ? e.message : e),'bad'); }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
</body>
</html>
